async function decrypt(password) {
  try {
    const salt = Uint8Array.from(atob(encData.salt), c => c.charCodeAt(0));
    const iv = Uint8Array.from(atob(encData.iv), c => c.charCodeAt(0));
    const ciphertext = Uint8Array.from(atob(encData.ciphertext), c => c.charCodeAt(0));

    const encoder = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
      "raw", encoder.encode(password), "PBKDF2", false, ["deriveKey"]
    );

    const key = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
      keyMaterial,
      { name: "AES-GCM", length: 256 },
      false,
      ["decrypt"]
    );

    const decrypted = await crypto.subtle.decrypt(
      { name: "AES-GCM", iv: iv },
      key,
      ciphertext
    );

    const decoder = new TextDecoder();
    const html = decoder.decode(decrypted);
    document.open();
    document.write(html);
    document.close();
    return true;
  } catch (e) {
    return false;
  }
}

document.getElementById("lockForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  const pw = document.getElementById("passwordInput").value;
  const success = await decrypt(pw);
  if (!success) {
    document.getElementById("errorMsg").style.display = "block";
    document.getElementById("passwordInput").value = "";
    document.getElementById("passwordInput").focus();
  }
});
</script>
